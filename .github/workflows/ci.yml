name: CI

on:
  push:
  pull_request:

jobs:
  engine-tests:
    name: Decision engine (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Code/server/decision-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -q

  api-tests:
    name: API integration (node:test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: campus
          POSTGRES_PASSWORD: campus
          POSTGRES_DB: campus_sense
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U campus -d campus_sense"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://campus:campus@localhost:5432/campus_sense
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Apply database schema
        run: psql "$DATABASE_URL" -f Code/db/schema.sql
      - name: Install API deps
        working-directory: Code/server/api
        run: npm install --no-audit --no-fund
      - name: Run API tests
        working-directory: Code/server/api
        run: npm test

  client-build:
    name: Client build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Code/client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run build
