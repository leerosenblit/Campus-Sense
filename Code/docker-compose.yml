services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: campus-mosquitto
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT over WebSocket (optional)
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: campus-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus}
      POSTGRES_DB: ${POSTGRES_DB:-campus_sense}
    ports:
      - "5433:5432"   # host 5433 to avoid clashing with a local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    restart: unless-stopped

  # API and decision-engine can be containerized in Sprint 3.
  # During development they are run directly (see README) for fast reloads.

volumes:
  mosquitto_data:
  mosquitto_log:
  postgres_data:
