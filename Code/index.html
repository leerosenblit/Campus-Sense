    <title>Campus-Sense Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .header { text-align: center; color: #2c3e50; }
        .dashboard { display: flex; justify-content: center; margin-top: 50px; }
        .room-card { 
            background: white; border-radius: 10px; padding: 30px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; text-align: center;
            transition: all 0.3s ease;
        }
        .status-indicator { 
            width: 20px; height: 20px; border-radius: 50%; display: inline-block; margin-right: 10px;
        }
        .status-row { display: flex; align-items: center; justify-content: center; margin: 15px 0; font-size: 1.2em; }
        .hazard-alert { 
            background-color: #ff4d4d; color: white; padding: 15px; 
            border-radius: 5px; font-weight: bold; margin-top: 20px; display: none;
            animation: blink 1s linear infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        /* Dynamic state classes */
        .color-green { background-color: #2ecc71; }
        .color-red { background-color: #e74c3c; }
        .color-gray { background-color: #95a5a6; }
        .color-yellow { background-color: #f1c40f; }
    </style>
</head>
<body>

        <div class="room-card" id="roomCard">
            <h2>Room 301</h2>
            
            <div class="status-row">
                <div id="occColor" class="status-indicator color-gray"></div>
                <span>Occupancy: <strong id="occText">Loading...</strong></span>
            </div>

            <div class="status-row">
                <div id="sysColor" class="status-indicator color-gray"></div>
                <span>Systems: <strong id="sysText">Loading...</strong></span>
            </div>

            <div id="hazardBanner" class="hazard-alert">
                ⚠️ HAZARD DETECTED: SPILL REPORTED!
            </div>
        </div>
    </div>

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // DOM Elements
        const occColor = document.getElementById('occColor');
        const occText = document.getElementById('occText');
        const sysColor = document.getElementById('sysColor');
        const sysText = document.getElementById('sysText');
        const hazardBanner = document.getElementById('hazardBanner');
        const roomCard = document.getElementById('roomCard');

        // Listen for real-time updates from Room 301
        const roomRef = db.ref('campus/rooms/301');
        
        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                // Update Occupancy UI
                if (data.isOccupied) {
                    occText.innerText = "Yes";
                    occColor.className = "status-indicator color-green";
                } else {
                    occText.innerText = "No";
                    occColor.className = "status-indicator color-red";
                }

                // Update Systems UI
                if (data.systemsOn) {
                    sysText.innerText = "ON (Active)";
                    sysColor.className = "status-indicator color-yellow";
                } else {
                    sysText.innerText = "OFF (Energy Saving)";
                    sysColor.className = "status-indicator color-gray";
                }

                // Update Hazard UI
                if (data.hazardReported) {
                    hazardBanner.style.display = "block";
                    roomCard.style.border = "2px solid red";
                } else {
                    hazardBanner.style.display = "none";
                    roomCard.style.border = "none";
                }
            }
        });
