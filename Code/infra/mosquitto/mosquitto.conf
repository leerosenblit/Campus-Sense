# Campus-Sense Mosquitto broker config (development).
# The book uses MQTT v3.1.1 with TLS + per-unit client certs (§4.5.1).
# For laptop development we allow anonymous local connections; TLS/auth is a
# Sprint-3 hardening task.

listener 1883
allow_anonymous true

# Optional MQTT-over-WebSocket listener (useful for browser debugging tools)
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
